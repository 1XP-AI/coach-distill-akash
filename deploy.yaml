---
# Akash SDL — Phase B: Qwen3.5-0.8B LoRA training on a rented A100.
# Pulls the Phase-A dataset from HF, renders training pairs, trains, pushes the
# adapter to HUB_REPO. Run Phase A (datagen.yaml) FIRST. STOCK pytorch image +
# public-repo bootstrap (no GitHub token). Paste into Console; add HF_TOKEN.
version: "2.0"

services:
  train:
    image: pytorch/pytorch:2.6.0-cuda12.4-cudnn9-runtime
    env:
      - REPO_ROOT=/app/repo
      - STUDENT_MODEL=Qwen/Qwen3.5-0.8B
      - EPOCHS=3.3
      - BATCH_SIZE=8 # A100 80GB has headroom
      - MAX_SEQ_LEN=3328
      - LORA_RANK=16
      - DATA_REPO=jjangg96/coach-distill-data # Phase-A output (HF dataset)
      - HUB_REPO=jjangg96/coach-qwen35-0.8b-lora # adapter destination (auto-created)
      # add this secret in the Console before deploy:
      # - HF_TOKEN=hf_xxx   (write; pulls dataset + pushes adapter)
    command:
      - bash
      - -lc
    args:
      - >-
        apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates &&
        git clone --depth 1 https://github.com/1XP-AI/coach-distill-akash.git "$REPO_ROOT" &&
        exec bash "$REPO_ROOT/entrypoint-train.sh"
    expose:
      - port: 8080
        as: 80
        to:
          - global: true

profiles:
  compute:
    train:
      resources:
        cpu:
          units: 8
        memory:
          size: 32Gi
        storage:
          size: 60Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: a100
  placement:
    akash:
      pricing:
        train:
          denom: uakt
          amount: 100000 # ceiling per block; Console suggests the live rate

deployment:
  train:
    akash:
      profile: train
      count: 1
