---
# Akash SDL — Phase C: score the trained STUDENT on the eval grid (A100).
# Serves Qwen3.5-0.8B + the trained LoRA via vLLM and runs the same grid + 5
# gates the teacher was scored on. Uploads per-case outputs to a public HF repo.
# Paste into https://air.akash.network; add HF_TOKEN; fund in ACT (~0.3).
version: "2.0"

services:
  eval:
    image: vllm/vllm-openai:latest
    env:
      - REPO_ROOT=/app/repo
      - BASE_MODEL=Qwen/Qwen3.5-0.8B
      - ADAPTER=jjangg96/coach-qwen35-0.8b-lora
      - EVAL_REPO=jjangg96/coach-eval-phaseC
      # add this secret in the Console before deploy:
      # - HF_TOKEN=hf_xxx
    command:
      - bash
      - -lc
    args:
      - >-
        apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates &&
        git clone --depth 1 https://github.com/1XP-AI/coach-distill-akash.git "$REPO_ROOT" &&
        exec bash "$REPO_ROOT/entrypoint-eval.sh"
    expose:
      - port: 8000
        as: 80
        to:
          - global: true

profiles:
  compute:
    eval:
      resources:
        cpu:
          units: 6
        memory:
          size: 24Gi
        storage:
          size: 40Gi # Qwen3.5-0.8B (~1.6GB) + adapter — tiny vs Gemma
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: a100
  placement:
    akash:
      pricing:
        eval:
          denom: uakt
          amount: 100000

deployment:
  eval:
    akash:
      profile: eval
      count: 1
